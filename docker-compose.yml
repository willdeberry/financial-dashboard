version: '3.9'

services:
  backend:
    image: python:3.11-slim
    container_name: financial-api
    working_dir: /app
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - pip-cache:/usr/local/lib/python3.11/site-packages
    command: sh -c "pip install -r requirements.txt -q && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - financial-dashboard-network
    restart: unless-stopped

volumes:
  uploads:
  pip-cache:

networks:
  financial-dashboard-network:
    driver: bridge
